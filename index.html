<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>精品资源收藏保存</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: sans-serif;
    }

    .container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background-image: url('./imgs/bg.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 0;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.349);
      /* Semi-transparent black overlay */
      z-index: -1;
      /* Place it behind the content */
    }

    .top-section {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 15px;
    }

    .title-large {
      font-size: 24px;
      font-weight: bold;
      color: white;
      margin-top: 10px;
      text-align: center;
    }

    .title-small {
      font-size: 16px;
      color: rgb(226, 223, 223);
      margin-top: 5px;
      text-align: center;
    }

    .middle-section {
      margin-top: 20px;
      width: 90%;
      max-width: 400px;
    }

    .card {
      --border-size: 3px;
      --angle: 0deg;

      border: var(--border-size) solid transparent;
      border-radius: 12px;

      /* 关键：设置三层背景 */
      background-image:
        /* 第1层 (最上层): 半透明白色，用于卡片内容区域 */
        linear-gradient(to right, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)),

        /* 第2层 (中间层): 不透明的深色，用于遮挡流光 */
        linear-gradient(to right, #222, #222),

        /* 第3层 (最下层): 彩虹渐变，用于边框 */
        conic-gradient(from var(--angle), #ff0000, #ffdd00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);

      /* 关键：为三层背景分别设置裁剪区域 */
      background-clip:
        padding-box,
        /* 第1层背景裁剪到 padding 区域 */
        padding-box,
        /* 第2层背景也裁剪到 padding 区域 */
        border-box;
      /* 第3层背景铺满 border 区域 */

      background-origin: border-box;

      animation: rainbow-border-spin 3s linear infinite;

      /* 以下是原有的布局样式 */
      padding: 8px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: inherit;
    }

    /* 注册一个--angle变量，让浏览器可以对它进行平滑的动画处理 */
    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    /* 定义一个旋转--angle变量的动画 */
    @keyframes rainbow-border-spin {
      to {
        --angle: 360deg;
      }
    }

    .card-link {
      text-decoration: none;
      color: inherit;
    }

    .card-icon {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
    }

    .card-text {
      flex-grow: 1;
      margin-left: 15px;
      margin-right: 15px;
      font-size: 16px;
    }

    .card-arrow {
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 8px solid #555;
    }

    .bottom-section {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100px;
      background-color: rgba(128, 128, 128, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .overlay {
      display: flex;
      gap: 15px;
    }

    .link-button {
      background-color: rgba(255, 255, 255, 0.9);
      color: #333;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
    }

    #bookmark-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      display: none;
      /* Initially hidden */
      justify-content: center;
      align-items: center;
      z-index: 1000;
      cursor: pointer;
    }

    .bookmark-popup {
      background-color: white;
      border-radius: 10px;
      padding: 20px;
      width: 90%;
      max-width: 350px;
      cursor: default;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      text-align: left;
    }

    .bookmark-header {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 15px;
    }

    .bookmark-content p {
      margin: 10px 0;
      line-height: 1.5;
      display: flex;
      align-items: center;
    }

    .bookmark-content .inline-icon {
      width: 20px;
      height: 20px;
      margin: 0 5px;
      vertical-align: middle;
    }

    .bookmark-content hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 15px 0;
    }

    .bookmark-footer {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
  </style>
  <script>
    function bookmarkPage() {
      // Simple check for mobile devices based on user agent
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

      if (isMobile) {
        // On mobile, show the guide overlay
        const overlay = document.getElementById('bookmark-overlay');
        if (overlay) {
          overlay.style.display = 'flex';
        }
      } else {
        // On PC, show the keyboard shortcut alert
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
        const shortcut = isMac ? 'Cmd/⌘ + D' : 'Ctrl + D';
        alert('按下 ' + shortcut + ' 收藏本页');
      }
    }

    function hideBookmarkOverlay() {
      const overlay = document.getElementById('bookmark-overlay');
      if (overlay) {
        overlay.style.display = 'none';
      }
    }
  </script>
</head>
